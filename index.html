<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Profil Gue</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- SEMUA KODE CSS MASUK DI SINI --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 25px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            padding: 40px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .glass-card:active {
            transform: scale(0.98);
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 3px solid #e94560;
            padding: 5px;
            background: rgba(255,255,255,0.1);
        }

        .profile-pic img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        h2 { color: #fff; margin-bottom: 5px; }
        p { color: #ccc; font-size: 0.9rem; margin-bottom: 20px; }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-primary { background: #e94560; color: white; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: white; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="profile-pic">
            <img src="https://api.dicebear.com/8.x/lorelei/svg?seed=Fauzan" alt="Profil">
        </div>
        
        <h2>Nama Lo Di Sini</h2>
        <p>Gue baru aja belajar bikin web dari HP. Keren kan?</p>
        
        <button class="btn btn-primary" id="btnKlik">Sapa Gue!</button>
        <a href="https://google.com" class="btn btn-secondary">Cari di Google</a>
    </div>

    <script>
        /* --- SEMUA KODE JAVASCRIPT MASUK DI SINI --- */
        const tombol = document.getElementById('btnKlik');
        tombol.addEventListener('click', () => {
            alert('Halo! Makasih udah mampir ke web buatan gue!');
        });
    </script>

</body>
</html>
