<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmbaSlot - Animasi Gacor!</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            text-align: center; 
            background-color: #1a1a1a; 
            color: white; 
            padding-top: 50px; 
            overflow-x: hidden; /* Biar gak goyang pas animasi */
        }
        
        h1 { color: gold; text-shadow: 2px 2px #000; cursor: pointer; user-select: none; }
        
        /* Wadah Slot Utama */
        .slot-container { 
            font-size: 60px; 
            margin: 20px; 
            padding: 30px; 
            background: #333; 
            border: 8px solid gold; 
            display: inline-block; 
            border-radius: 20px;
            box-shadow: 0 0 20px gold;
            position: relative;
        }

        /* Gaya untuk masing-masing kotak simbol */
        .slot-box {
            display: inline-block;
            width: 80px; /* Atur lebar kotak biar pas */
            text-align: center;
            position: relative;
        }

        /* Pembatas vertikal (|) */
        .divider {
            font-size: 60px;
            color: #555;
            vertical-align: top;
        }

        /* --- CSS ANIMASI MUTER --- */
        .spinning {
            animation: spinEffect 0.1s infinite linear;
            filter: blur(4px); /* Efek blur biar kelihatan cepet */
            opacity: 0.7;
        }

        @keyframes spinEffect {
            0% { transform: translateY(-10px); }
            50% { transform: translateY(10px); }
            100% { transform: translateY(-10px); }
        }

        /* --- CSS ANIMASI JACKPOT --- */
        .jackpot-glow {
            animation: glow 0.5s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 20px gold; border-color: gold; }
            to { box-shadow: 0 0 50px red; border-color: white; transform: scale(1.05); }
        }

        /* Tombol & Lainnya */
        button { 
            font-size: 24px; padding: 15px 30px; cursor: pointer; 
            background: linear-gradient(to bottom, gold, orange); 
            border: none; border-radius: 10px; font-weight: bold;
            box-shadow: 0 5px #999; transition: all 0.1s;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px #666; }
        button:disabled { background: gray; cursor: not-allowed; opacity: 0.6; box-shadow: none; }
        #status { margin-top: 30px; font-size: 1.5em; height: 40px; font-weight: bold; }
        .info { font-size: 1.2em; color: #00ff00; }
    </style>
</head>
<body>

    <h1 onclick="activateCheat()">🎰 AMBASLOT 🎰</h1>
    
    <p class="info">Saldo: <span id="balance">500</span> Koin</p>

    <div id="slotBox" class="slot-container">
        <div class="slot-box">
            <span id="s1">❓</span>
        </div>
        <span class="divider">|</span>
        <div class="slot-box">
            <span id="s2">❓</span>
        </div>
        <span class="divider">|</span>
        <div class="slot-box">
            <span id="s3">❓</span>
        </div>
    </div>

    <br><br>
    <button onclick="playSlot()" id="spinBtn">SPIN (10 Koin)</button>
    
    <div id="status">Berani Putar, Berani Menang!</div>

    <audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="winSound" src="https://www.soundjay.com/misc/sounds/coins-spilled-1.mp3"></audio>

    <script>
        // --- CONFIG ---
        let balance = 500;
        const betCost = 10;
        const winPrize = 500;
        const symbols = ["🍒", "🍊", "🍋", "🔔", "💎"];
        let clickCount = 0;

        // FUNGSI CHEAT (Ketuk Judul 5x)
        function activateCheat() {
            clickCount++;
            if (clickCount === 5) {
                balance += 1000;
                updateUI();
                document.getElementById('status').innerHTML = "<span style='color:cyan'>CHEAT AKTIF: +1000!</span>";
                clickCount = 0;
            }
        }

        // FUNGSI UTAMA GAME
        function playSlot() {
            const statusText = document.getElementById('status');
            const spinBtn = document.getElementById('spinBtn');
            const spinAudio = document.getElementById('spinSound');
            const winAudio = document.getElementById('winSound');
            const slotBox = document.getElementById('slotBox');

            // 1. Matikan efek jackpot lama
            slotBox.classList.remove('jackpot-glow');

            // 2. Cek Saldo
            if (balance < betCost) {
                statusText.innerHTML = "<span style='color:red'>Saldo Habis, Bos! Pake Cheat gih.</span>";
                return;
            }

            // 3. Bayar Taruhan & Update
            balance -= betCost;
            updateUI();
            
            spinBtn.disabled = true; // Matikan tombol
            statusText.innerText = "🎰 MUTER GACOORRR... 🎰";
            
            // 4. Mainkan Suara
            spinAudio.currentTime = 0;
            spinAudio.play();

            // 5. MULAILAH ANIMASI MUTER
            const s1 = document.getElementById('s1');
            const s2 = document.getElementById('s2');
            const s3 = document.getElementById('s3');

            s1.classList.add('spinning');
            s2.classList.add('spinning');
            s3.classList.add('spinning');

            // Ganti-ganti gambar acak pas lagi muter (efek visual)
            let spinAnimation = setInterval(() => {
                s1.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                s2.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                s3.innerText = symbols[Math.floor(Math.random() * symbols.length)];
            }, 50); // Ganti gambar tiap 50ms

            // 6. BERHENTIKAN SETELAH JEDA (Misal 1.5 detik)
            setTimeout(() => {
                clearInterval(spinAnimation); // Stop ganti gambar acak

                // Matikan kelas animasi CSS
                s1.classList.remove('spinning');
                s2.classList.remove('spinning');
                s3.classList.remove('spinning');

                // Tentukan Hasil Akhir
                const res1 = symbols[Math.floor(Math.random() * symbols.length)];
                const res2 = symbols[Math.floor(Math.random() * symbols.length)];
                const res3 = symbols[Math.floor(Math.random() * symbols.length)];

                // Tampilkan Hasil Akhir
                s1.innerText = res1;
                s2.innerText = res2;
                s3.innerText = res3;

                // 7. CEK MENANG/KALAH
                if (res1 === res2 && res2 === res3) {
                    balance += winPrize;
                    statusText.innerHTML = "<span style='color:yellow'>🔥 JACKPOTTT!!! + " + winPrize + " 🔥</span>";
                    slotBox.classList.add('jackpot-glow'); // Efek heboh
                    
                    // Suara Koin
                    winAudio.currentTime = 0;
                    winAudio.play();
                } else {
                    statusText.innerText = "Zonk! Coba lagi, Bos.";
                }

                updateUI();
                spinBtn.disabled = false; // Aktifkan tombol lagi

            }, 1500); // Lama muter: 1500ms (1.5 detik)
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance;
        }
    </script>
</body>
</html>
